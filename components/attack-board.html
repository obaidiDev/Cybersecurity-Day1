<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ATT&CK Board · Majal</title>
<link rel="stylesheet" href="../css/theme.css">
<style>
  html,body{ margin:0; background:var(--paper); color:var(--ink); font-family:var(--font-body); }
  .wrap{ padding:16px 18px 26px; }
  .top{ display:flex; justify-content:space-between; align-items:flex-end; gap:12px; flex-wrap:wrap; margin-bottom:12px;}
  .top h1{ font-family:var(--font-display); color:var(--petrol); font-size:21px; margin:0;}
  .top .sub{ font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; color:#6a838a; text-transform:uppercase;}
  .controls{ display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .days{ display:flex; gap:6px; }
  .day{ font-family:var(--font-mono); font-size:12px; padding:6px 11px; border-radius:999px; border:2px solid var(--line);
    background:#fff; cursor:pointer; color:#4a666e; }
  .day.on{ color:#fff; border-color:transparent; }
  .toolbtn{ font-family:var(--font-mono); font-size:12px; border:1px solid var(--line); background:#fff; color:#4a666e;
    border-radius:9px; padding:6px 10px; cursor:pointer; text-decoration:none;}
  .toolbtn:hover{ border-color:var(--teal); color:var(--teal-deep); }

  .matrix{ display:grid; grid-auto-flow:column; grid-auto-columns:minmax(128px,1fr); gap:8px; overflow-x:auto; padding-bottom:8px;}
  .col{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:8px; }
  .col h4{ margin:0 0 3px; font-family:var(--font-display); font-size:12.5px; color:var(--petrol); line-height:1.1;}
  .col .tac{ font-family:var(--font-mono); font-size:9px; color:#8aa2a8; letter-spacing:.05em; margin-bottom:7px;}
  .tech{ position:relative; border:1px solid var(--line); border-radius:8px; padding:6px 7px; margin-bottom:6px; cursor:pointer;
    transition:.15s; background:var(--paper); }
  .tech:hover{ border-color:var(--teal); }
  .tech .tid{ font-family:var(--font-mono); font-size:10px; color:var(--teal-deep); background:transparent; border:0; padding:0;}
  .tech .tnm{ font-size:10.5px; color:#3d5b63; line-height:1.15; margin-top:1px;}
  .tech .dots{ position:absolute; top:5px; right:6px; display:flex; gap:3px; }
  .tech .dots i{ width:8px; height:8px; border-radius:50%; }
  .tech.tagged{ background:#fff; border-color:var(--petrol); box-shadow:inset 0 0 0 1px var(--petrol);}

  .footbar{ display:flex; justify-content:space-between; align-items:center; margin-top:12px; gap:12px; flex-wrap:wrap;}
  .cover{ font-family:var(--font-mono); font-size:12px; color:#4a666e; }
  .cover b{ color:var(--petrol); font-size:15px; }
  .legend{ display:flex; gap:10px; flex-wrap:wrap; font-family:var(--font-mono); font-size:11px; color:#4a666e;}
  .legend span{ display:flex; align-items:center; gap:5px; }
  .legend i{ width:10px;height:10px;border-radius:50%; }

  .tip{ position:fixed; pointer-events:none; background:var(--petrol); color:#eaf6f8; font-size:12px; line-height:1.35;
    padding:8px 11px; border-radius:9px; max-width:240px; box-shadow:var(--shadow); opacity:0; transition:.12s; z-index:50;}
  .hintline{ font-family:var(--font-mono); font-size:11px; color:#6a838a; margin:2px 0 12px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <div class="sub">Majal · the shared vocabulary</div>
      <h1>MITRE ATT&CK — tag every attack, all week</h1>
    </div>
    <div class="controls">
      <div class="days" id="days"></div>
      <a class="toolbtn" href="https://mitre-attack.github.io/attack-navigator/" target="_blank" rel="noopener">Open real Navigator ↗</a>
      <button class="toolbtn" id="export">Export</button>
      <button class="toolbtn" id="reset">Reset</button>
    </div>
  </div>
  <div class="hintline">Click a technique to tag it for the selected day. Cells fill with a dot per day that used them — coverage builds as the week goes.</div>

  <div class="matrix" id="matrix"></div>

  <div class="footbar">
    <div class="cover">This week so far: <b id="cov-tech">0</b> techniques across <b id="cov-tac">0</b> tactics.</div>
    <div class="legend" id="legend"></div>
  </div>
</div>
<div class="tip" id="tip"></div>

<script src="../lib/confetti.js"></script>
<script>
(function(){
  const $=(s,r=document)=>r.querySelector(s), $$=(s,r=document)=>[...r.querySelectorAll(s)];
  const KEY='majal.attackboard.v1';
  const DAY_COLORS=['#0A5C78','#23C4C0','#E2A233','#9a66ff','#e15b5b'];
  const DAYS=['Day 1','Day 2','Day 3','Day 4','Day 5'];

  // Curated enterprise matrix (subset — real IDs + one-line descriptions)
  const TACTICS=[
    {id:'TA0043',n:'Reconnaissance',t:[
      ['T1589','Gather victim identity info','Harvest emails, names, roles (e.g. from LinkedIn).'],
      ['T1591','Gather victim org info','Learn structure, business relationships, tech in use.'],
      ['T1598','Phishing for information','Trick targets into revealing details.']]},
    {id:'TA0042',n:'Resource Development',t:[
      ['T1583','Acquire infrastructure','Register domains / servers for the operation.'],
      ['T1587','Develop capabilities','Build malware, exploits, certificates.'],
      ['T1585','Establish accounts','Create fake personas / accounts.']]},
    {id:'TA0001',n:'Initial Access',t:[
      ['T1566','Phishing','Malicious email/link/attachment to get in.'],
      ['T1190','Exploit public-facing app','Attack an internet-exposed service.'],
      ['T1078','Valid accounts','Log in with stolen legitimate credentials.'],
      ['T1195','Supply-chain compromise','Get in via a trusted vendor/software.']]},
    {id:'TA0002',n:'Execution',t:[
      ['T1059','Command & scripting interpreter','Run PowerShell/Bash/JS commands.'],
      ['T1204','User execution','User opens the malicious file/link.'],
      ['T1053','Scheduled task/job','Use the scheduler to run code.']]},
    {id:'TA0003',n:'Persistence',t:[
      ['T1053','Scheduled task/job','Re-run after reboot via scheduler.'],
      ['T1547','Boot/logon autostart','Run automatically at startup/login.'],
      ['T1136','Create account','Add a hidden account to keep access.']]},
    {id:'TA0004',n:'Privilege Escalation',t:[
      ['T1548','Abuse elevation control','Bypass UAC/sudo to gain rights.'],
      ['T1068','Exploit for priv-esc','Use a vuln to get higher privileges.'],
      ['T1078','Valid accounts','Reuse admin creds for more power.']]},
    {id:'TA0005',n:'Defense Evasion',t:[
      ['T1070','Indicator removal','Delete logs / artifacts to hide.'],
      ['T1027','Obfuscated files/info','Encode or pack payloads.'],
      ['T1055','Process injection','Hide code inside a legit process.'],
      ['T1218','System binary proxy exec','Abuse trusted binaries (LOLBins).']]},
    {id:'TA0006',n:'Credential Access',t:[
      ['T1003','OS credential dumping','Pull passwords/hashes from memory.'],
      ['T1110','Brute force','Guess passwords at scale.'],
      ['T1558','Steal/forge Kerberos tickets','Kerberoasting, golden tickets.']]},
    {id:'TA0007',n:'Discovery',t:[
      ['T1087','Account discovery','Enumerate users and groups.'],
      ['T1046','Network service discovery','Scan for services / open ports.'],
      ['T1018','Remote system discovery','Map other machines on the network.']]},
    {id:'TA0008',n:'Lateral Movement',t:[
      ['T1021','Remote services','Move via RDP/SMB/SSH.'],
      ['T1550','Use alternate auth material','Pass-the-hash / ticket.'],
      ['T1570','Lateral tool transfer','Copy tools between machines.']]},
    {id:'TA0009',n:'Collection',t:[
      ['T1560','Archive collected data','Zip/encrypt data before theft.'],
      ['T1005','Data from local system','Grab files from the host.'],
      ['T1114','Email collection','Harvest mailboxes.']]},
    {id:'TA0011',n:'Command & Control',t:[
      ['T1071','Application-layer protocol','C2 over HTTP/DNS to blend in.'],
      ['T1105','Ingress tool transfer','Download more tools from C2.'],
      ['T1573','Encrypted channel','Hide C2 traffic with encryption.']]},
    {id:'TA0010',n:'Exfiltration',t:[
      ['T1041','Exfiltration over C2','Send data back through the C2 channel.'],
      ['T1567','Exfil over web service','Upload to cloud storage.'],
      ['T1048','Exfil over alt protocol','Sneak data out via DNS/FTP.']]},
    {id:'TA0040',n:'Impact',t:[
      ['T1486','Data encrypted for impact','Ransomware encryption.'],
      ['T1490','Inhibit system recovery','Delete backups / shadow copies.'],
      ['T1485','Data destruction','Wipe systems / data.']]}
  ];

  // state: { cur:0, tags: { "T1566": [0,2], ... } }  (values = day indices)
  function load(){
    let d; try{ d=JSON.parse(localStorage.getItem(KEY)); }catch(e){}
    if(!d||!d.tags){
      // Day-1 seed matches the kill-chain sample so the two artifacts connect
      const seed=['T1589','T1591','T1566','T1204','T1059','T1053','T1003','T1078','T1021','T1560','T1041','T1486'];
      d={cur:0, tags:{}}; seed.forEach(t=> d.tags[t]=[0]); save(d);
    }
    return d;
  }
  function save(d){ try{ localStorage.setItem(KEY,JSON.stringify(d)); }catch(e){} }
  let data=load();

  function renderDays(){
    $('#days').innerHTML=DAYS.map((d,i)=>
      `<button class="day ${i===data.cur?'on':''}" data-i="${i}"
        style="${i===data.cur?`background:${DAY_COLORS[i]}`:''}">${d}</button>`).join('');
    $$('#days .day').forEach(b=> b.onclick=()=>{ data.cur=+b.dataset.i; save(data); renderDays(); renderMatrix(); });
    $('#legend').innerHTML=DAYS.map((d,i)=>`<span><i style="background:${DAY_COLORS[i]}"></i>${d}</span>`).join('');
  }

  function renderMatrix(){
    $('#matrix').innerHTML=TACTICS.map(tac=>
      `<div class="col"><h4>${tac.n}</h4><div class="tac">${tac.id}</div>${
        tac.t.map(([id,nm,desc])=>{
          const days=data.tags[id]||[];
          const tagged=days.includes(data.cur);
          return `<div class="tech ${tagged?'tagged':''}" data-id="${id}" data-desc="${nm}: ${desc}">
            <div class="dots">${days.map(dy=>`<i style="background:${DAY_COLORS[dy]}"></i>`).join('')}</div>
            <div class="tid">${id}</div><div class="tnm">${nm}</div></div>`;
        }).join('')
      }</div>`).join('');
    $$('.tech').forEach(el=>{
      el.onclick=()=>toggle(el.dataset.id);
      el.onmousemove=e=>tip(e,el.dataset.desc);
      el.onmouseleave=()=>{ $('#tip').style.opacity=0; };
    });
    updateCoverage();
  }
  function toggle(id){
    const arr=data.tags[id]||[];
    const i=arr.indexOf(data.cur);
    if(i>=0) arr.splice(i,1); else { arr.push(data.cur);
      if(window.confetti) confetti({particleCount:22,spread:45,scalar:.7,colors:[DAY_COLORS[data.cur],'#E2E233']}); }
    if(arr.length) data.tags[id]=arr; else delete data.tags[id];
    save(data); renderMatrix();
  }
  function updateCoverage(){
    const ids=Object.keys(data.tags);
    $('#cov-tech').textContent=ids.length;
    const tacs=new Set();
    TACTICS.forEach(tac=> tac.t.forEach(([id])=>{ if(data.tags[id]) tacs.add(tac.id); }));
    $('#cov-tac').textContent=tacs.size;
  }
  function tip(e,txt){ const t=$('#tip'); t.textContent=txt; t.style.opacity=1;
    t.style.left=Math.min(e.clientX+12, innerWidth-260)+'px'; t.style.top=(e.clientY+14)+'px'; }

  $('#reset').onclick=()=>{ if(confirm('Clear all tags for the week?')){ localStorage.removeItem(KEY); data=load(); renderDays(); renderMatrix(); } };
  $('#export').onclick=()=>{ const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='majal-attack-board.json'; a.click(); };

  renderDays(); renderMatrix();
})();
</script>
</body>
</html>
